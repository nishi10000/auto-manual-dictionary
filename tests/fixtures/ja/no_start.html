<!doctype html><html><head><title>始動不良 点検</title></head><body>
<h1>始動不良</h1>
<h2>エンジンが始動しない場合</h2>
<p>症状: エンジンがかからない、または始動不良が発生する。DTC P0A80 を確認する。</p>
<div class="caution">注意: 点検前に補機バッテリー電圧 12 V を確認する。</div>
<img src="images/engine_start.png" alt="始動系統図">
<table><tr><th>項目</th><th>基準</th></tr><tr><td>燃圧</td><td>304 kPa</td></tr><tr><td>クランキング回転数</td><td>200 rpm</td></tr></table>
<h2>燃料系点検</h2>
<p>燃圧が低い場合は燃料ポンプ回路を点検する。</p>
</body></html>
