<h1>No Start Condition</h1>
<h2>Fuel system inspection</h2>
<p>If the engine does not start and fuel pressure is low, inspect the fuel pump circuit.</p>
<p>Reference DTC P0A80 and confirm auxiliary battery voltage 12 V before diagnosis.</p>
